<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Get a Free Quote! - 9th Island Pressure Washing</title>
  <link rel="stylesheet" href="../styles/style.css">
</head>
<body>
  <nav>
    <a href="../index.html" class="nav-brand"><img src="../images/logo.png" alt="9th Island" class="nav-logo"></a>
    <ul class="nav-links">
      <li><a href="../index.html">Home</a></li>
      <li><a href="../quote/index.html">Get a Free Quote!</a></li>
      <li><a href="../about-pw/index.html">New to Pressure Washing?</a></li>
      <li><a href="../origins/index.html">9th Island's Origins</a></li>
      <li><a href="../our-work/index.html">Our Work</a></li>
    </ul>
  </nav>

  <main>
    <h1>Get a Free Quote!</h1>

    <form>
      <label for="first-name">First Name</label>
      <input type="text" id="first-name" name="first-name" required>

      <label for="last-name">Last Name</label>
      <input type="text" id="last-name" name="last-name" required>

      <label for="address">Address</label>
      <input type="text" id="address" name="address" required>

      <label for="phone">Phone Number</label>
      <input type="tel" id="phone" name="phone" required>

      <label for="service">Type of Service</label>
      <select id="service" name="service" required>
        <option value="" disabled selected>Select a service</option>
        <option value="driveway">Driveway / Concrete Cleaning</option>
        <option value="trashbin">Trashbin Cleaning</option>
      </select>

      <button type="submit">Submit</button>
    </form>
  </main>
</body>
</html>
