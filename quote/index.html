<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Get a Free Quote! - 9th Island Pressure Washing</title>
  <link rel="stylesheet" href="../styles/style.css">
</head>
<body>
  <nav>
    <a href="../index.html" class="nav-brand"><img src="../images/logo.png" alt="9th Island" class="nav-logo"></a>
    <ul class="nav-links">
      <li><a href="../index.html">Home</a></li>
      <li><a href="../quote/index.html">Get a Free Quote!</a></li>
      <li><a href="../about-pw/index.html">New to Pressure Washing?</a></li>
      <li><a href="../origins/index.html">9th Island's Origins</a></li>
      <li><a href="../our-work/index.html">Our Work</a></li>
    </ul>
  </nav>

  <main>
    <h1>Get a Free Quote!</h1>

    <form>
      <label for="first-name">First Name</label>
      <input type="text" id="first-name" name="first-name" required>

      <label for="last-name">Last Name</label>
      <input type="text" id="last-name" name="last-name" required>

      <label for="address">Address</label>
      <input type="text" id="address" name="address" required>

      <label for="phone">Phone Number</label>
      <input type="tel" id="phone" name="phone" required>

      <label for="service">Type of Service</label>
      <select id="service" name="service" required>
        <option value="" disabled selected>Select a service</option>
        <option value="driveway">Driveway / Concrete Cleaning</option>
        <option value="trashbin">Trashbin Cleaning</option>
      </select>

      <button type="submit">Submit</button>
    </form>

    <div id="form-message" style="display:none; margin-top: 16px; padding: 12px; border-radius: 4px;"></div>
  </main>

  <script>
    document.querySelector('form').addEventListener('submit', async function(e) {
      e.preventDefault();

      const messageDiv = document.getElementById('form-message');
      const submitBtn = this.querySelector('button[type="submit"]');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Submitting...';

      const data = {
        firstName: document.getElementById('first-name').value,
        lastName: document.getElementById('last-name').value,
        address: document.getElementById('address').value,
        phone: document.getElementById('phone').value,
        service: document.getElementById('service').value
      };

      try {
        const response = await fetch('http://localhost:3000/api/quote', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });

        const result = await response.json();

        messageDiv.style.display = 'block';
        if (result.success) {
          messageDiv.style.backgroundColor = '#d4edda';
          messageDiv.style.color = '#155724';
          messageDiv.textContent = result.message;
          this.reset();
        } else {
          messageDiv.style.backgroundColor = '#f8d7da';
          messageDiv.style.color = '#721c24';
          messageDiv.textContent = result.message;
        }
      } catch (error) {
        messageDiv.style.display = 'block';
        messageDiv.style.backgroundColor = '#f8d7da';
        messageDiv.style.color = '#721c24';
        messageDiv.textContent = 'Could not connect to server. Please try again.';
      }

      submitBtn.disabled = false;
      submitBtn.textContent = 'Submit';
    });
  </script>
</body>
</html>
